# OpenEnv Specification: Content Moderation RL Environment
# Production-grade environment for training content moderation AI agents

name: content-moderation-rl
version: 1.0.0
description: |
  A realistic content moderation environment where AI agents learn to:
  - Analyze user-generated content for policy violations
  - Make approve/reject/edit decisions
  - Handle borderline cases requiring nuanced judgment

  Supports three difficulty levels:
  - easy: Obvious spam/hate speech detection
  - medium: Borderline content requiring edits
  - hard: Subtle multi-violation content requiring reasoning

author: Content Compliance RL Team
license: MIT

# Environment interface specification
interface:
  # Observation space definition
  observation:
    type: dict
    fields:
      content:
        type: string
        description: User-generated content to evaluate
        max_length: 1000
      violations:
        type: list[string]
        description: Detected policy violation types
        items:
          enum:
            - hate_speech
            - violence
            - harassment
            - adult_content
            - misinformation
            - spam
            - suspicious_link
            - engagement_bait
            - illegal_content
      score:
        type: float
        description: Compliance score (0.0 = fully violating, 1.0 = fully compliant)
        range: [0.0, 1.0]
      step_count:
        type: integer
        description: Current step number in episode
        min: 0
      stage:
        type: string
        description: Current decision stage
        enum:
          - classification
          - decision
          - refinement
      previous_action:
        type: string
        description: Action taken in previous step
        nullable: true
        enum:
          - approve
          - reject
          - edit
      action_history:
        type: list[string]
        description: All actions taken in current episode
      feedback:
        type: string
        description: Feedback message from previous action
        nullable: true

  # Action space definition
  action:
    type: dict
    fields:
      action_type:
        type: string
        description: Type of moderation action
        enum:
          - approve
          - reject
          - edit
      edited_content:
        type: string
        description: Modified content (required for edit action)
        nullable: true
        max_length: 1000
      reasoning:
        type: string
        description: Optional explanation for the action
        nullable: true
        max_length: 500

  # Reward specification
  reward:
    type: float
    range: [0.0, 1.0]
    description: |
      Reward signal based on action correctness:
      - +1.0: Correct decision (approve clean / reject violating)
      - +0.5: Partially correct (edit instead of reject, or vice versa)
      - 0.0: Wrong decision
      - -0.2 penalty: Approving harmful content
      - -0.05 per step: Efficiency penalty

# Task configurations
tasks:
  easy:
    description: Binary approve/reject for obvious cases
    max_steps: 2
    content_types:
      - obvious_spam
      - clear_hate_speech
      - clean_welcome_messages
    expected_accuracy: 0.95

  medium:
    description: Borderline content requiring edits
    max_steps: 3
    content_types:
      - borderline_spam
      - subtle_harassment
      - edit_required_content
    expected_accuracy: 0.80

  hard:
    description: Complex multi-violation content
    max_steps: 5
    content_types:
      - multi_violation_posts
      - subtle_misinformation
      - coded_hate_speech
    expected_accuracy: 0.65

# Episode configuration
episode:
  max_steps: 5
  termination_conditions:
    - correct_terminal_action
    - max_steps_reached

# Environment metadata
metadata:
  domain: content_moderation
  use_case: |
    Training AI agents for real-world content moderation tasks
    including spam detection, hate speech identification, and
    community guideline enforcement.
  target_audience:
    - RL researchers
    - content moderation teams
    - AI safety researchers
  deployment:
    - docker
    - huggingface_spaces
    - local

# API endpoints (OpenEnv-compatible)
api:
  endpoints:
    - path: /reset
      method: POST
      description: Reset environment and start new episode
    - path: /step
      method: POST
      description: Take action in environment
    - path: /health
      method: GET
      description: Health check endpoint
    - path: /spec
      method: GET
      description: Environment specification

# Configuration options
config:
  evaluator_provider:
    type: string
    default: openai
    options:
      - openai
      - fallback
    description: Content evaluation backend

  model_name:
    type: string
    default: gpt-4o-mini
    description: Model for content evaluation

  difficulty:
    type: string
    default: mixed
    options:
      - easy
      - medium
      - hard
      - mixed
    description: Content difficulty level

  max_steps:
    type: integer
    default: 5
    range: [1, 10]
    description: Maximum steps per episode
